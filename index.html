<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">

  <title>Laboratorio – Gestión</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leafdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js<!-- Supabase -->
  https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #login, #panel {
      padding: 10px;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
    }

    #panel {
      display: none;
    }

    #map {
      height: calc(100vh - 120px);
      display: none;
    }

    label {
      font-weight: bold;
      margin-right: 5px;
    }

    select, button, input {
      margin-right: 10px;
      padding: 5px;
    }
  </style>
</head>
<body>

<div id="login">
  <h3>Login laboratorio</h3>
  <input id="email" type="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Entrar</button>
  <div id="loginMsg"></div>
</div>

<div id="panel">
  <label>Usuario</label>
  <select id="usuariosSelect"></select>

  <label>Sitio</label>
  <select id="sitiosSelect"></select>

  <button onclick="agregarMuestra()">Agregar muestra</button>
</div>

<div id="map"></div>

<script>
const SUPABASE_URL = "https://qtlegktrlrvtwfonqclj.supabase.co";
const SUPABASE_KEY = "sb_publishable_w-1OBaxH7ZHonR75QGxbEQ_IgjYw7Tu";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let map, markers;

async function login() {
  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) {
    loginMsg.textContent = error.message;
    return;
  }

  login.style.display = "none";
  panel.style.display = "block";
  map.style.display = "block";

  inicializarMapa();
  cargarUsuarios();
}

function inicializarMapa() {
  map = L.map("map").setView([-34.6, -58.4], 6);
  markers = L.layerGroup().addTo(map);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);
}

async function cargarUsuarios() {
  const { data, error } = await supabaseClient
    .from("usuarios")
    .select("id, email")
    .order("email");

  if (error) {
    console.error(error);
    return;
  }

  usuariosSelect.innerHTML =
    "<option value=''>-- elegir usuario --</option>";

  data.forEach(u => {
    const o = document.createElement("option");
    o.value = u.id;
    o.textContent = u.email;
    usuariosSelect.appendChild(o);
  });
}

usuariosSelect.addEventListener("change", async e => {
  markers.clearLayers();
  sitiosSelect.innerHTML =
    "<option value=''>-- elegir sitio --</option>";

  const usuarioId = e.target.value;
  if (!usuarioId) return;

  const { data } = await supabaseClient
    .from("sitios")
    .select("id, codigo_sitio, latitud, longitud")
    .eq("usuario_id", usuarioId);

  data.forEach(s => {
    const o = document.createElement("option");
    o.value = s.id;
    o.textContent = s.codigo_sitio;
    sitiosSelect.appendChild(o);

    if (s.latitud && s.longitud) {
      L.marker([s.latitud, s.longitud])
        .addTo(markers)
        .bindPopup(s.codigo_sitio);
    }
  });
});

async function agregarMuestra() {
  if (!sitiosSelect.value) {
    alert("Seleccioná un sitio");
    return;
  }

  const idLab = prompt("ID de laboratorio");
  if (!idLab) return;

  await supabaseClient.from("muestras").insert({
    sitio_id: sitiosSelect.value,
    id_lab: idLab,
    f_muestreo: new Date().toISOString().slice(0,10)
  });

  alert("Muestra creada");
}
</script>

</body>
</html>
